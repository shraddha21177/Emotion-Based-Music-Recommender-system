<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/login.css">
</head>

<body>
<div class="wrapper">
    <div class="form-box login">
        <h2>Login</h2>
        <form onsubmit="return false;" autocomplete="off">
            <div class="input-box">
                <span class="icon"><ion-icon name="mail"></ion-icon></span>
                <input type="email" id="email" placeholder="Please Enter Email" autocomplete="off" required>
                <label>Emails</label>
            </div>
            <div class="input-box">
                <span class="icon"><ion-icon name="lock"></ion-icon></span>
                <input type="password" id="password" placeholder="Please Enter Password" autocomplete="new-password" required>
                <label>Password</label>
            </div>
            <div class="remember-forgot">
            <label>
                <input type="checkbox">Remember me
            </label>
            <a href="#">Forgot Password?</a><br>
            </div>
            
            <button type="submit" class="btn" onclick="login(event)">Login</button>
            <div class="login-register">
                 <p>Don't have an account?<a href="/register-page" class="register-link">Register</a></p>
            </div>
               
        </form>
    </div>
</div>
<script src="/static/login.js"></script>
    <script src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons.js"></script>
</body>
</html>
